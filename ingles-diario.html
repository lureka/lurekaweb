<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Inglés Diario — Tu hora de inglés</title>
    <style>
      :root {
        --bg: #f4f5fb;
        --card: #ffffff;
        --ink: #1a1d2e;
        --ink2: #5a5f78;
        --ink3: #9aa0b8;
        --accent: #4f46e5;
        --accent2: #7c6ff0;
        --accent-soft: #eef0ff;
        --ok: #16a34a;
        --ok-soft: #e8f8ee;
        --bad: #dc2626;
        --bad-soft: #fdecec;
        --warn: #d97706;
        --warn-soft: #fef3e2;
        --gold: #f59e0b;
        --line: #e6e8f2;
        --radius: 16px;
        --shadow:
          0 1px 3px rgba(26, 29, 46, 0.06), 0 6px 20px rgba(26, 29, 46, 0.05);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.55;
        padding-bottom: 84px;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
        font-size: inherit;
        color: inherit;
      }
      input,
      textarea,
      select {
        font-family: inherit;
        font-size: 16px;
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 0 16px;
      }
      /* ---------- Header ---------- */
      header {
        background: linear-gradient(
          135deg,
          #4f46e5 0%,
          #7c6ff0 55%,
          #9d8cff 100%
        );
        color: #fff;
        padding: 18px 0 20px;
        margin-bottom: 18px;
      }
      header .wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .logo {
        font-weight: 800;
        font-size: 20px;
        letter-spacing: -0.3px;
      }
      .logo small {
        display: block;
        font-weight: 500;
        font-size: 12px;
        opacity: 0.85;
      }
      .hdr-right {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 14px;
        font-weight: 600;
      }
      .pill {
        background: rgba(255, 255, 255, 0.18);
        border-radius: 99px;
        padding: 5px 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }
      /* ---------- Nav ---------- */
      nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--card);
        border-top: 1px solid var(--line);
        display: flex;
        justify-content: space-around;
        padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
        z-index: 50;
      }
      nav button {
        flex: 1;
        max-width: 120px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        font-size: 11px;
        font-weight: 600;
        color: var(--ink3);
        padding: 6px 2px;
        border-radius: 10px;
      }
      nav button.on {
        color: var(--accent);
      }
      nav button .ic {
        font-size: 20px;
        line-height: 1;
      }
      @media (min-width: 760px) {
        body {
          padding-bottom: 30px;
        }
        nav {
          position: static;
          max-width: 860px;
          margin: 0 auto 18px;
          border: 1px solid var(--line);
          border-radius: var(--radius);
          box-shadow: var(--shadow);
        }
        nav button {
          flex-direction: row;
          gap: 8px;
          font-size: 14px;
          padding: 12px;
        }
      }
      /* ---------- Cards & common ---------- */
      .card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
        margin-bottom: 14px;
      }
      .card h2 {
        font-size: 17px;
        margin-bottom: 10px;
        letter-spacing: -0.2px;
      }
      .card h3 {
        font-size: 15px;
        margin: 12px 0 6px;
      }
      .muted {
        color: var(--ink2);
        font-size: 14px;
      }
      .tiny {
        color: var(--ink3);
        font-size: 12px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        padding: 13px 22px;
        border-radius: 12px;
        font-size: 15px;
        transition:
          transform 0.08s,
          box-shadow 0.2s;
        box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn.sec {
        background: var(--accent-soft);
        color: var(--accent);
        box-shadow: none;
      }
      .btn.ghost {
        background: none;
        color: var(--ink2);
        box-shadow: none;
        font-weight: 600;
      }
      .btn.small {
        padding: 8px 14px;
        font-size: 13px;
        border-radius: 10px;
      }
      .btn.wfull {
        width: 100%;
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .chip {
        display: inline-block;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 99px;
        margin-right: 6px;
      }
      .chip.ok {
        background: var(--ok-soft);
        color: var(--ok);
      }
      .chip.bad {
        background: var(--bad-soft);
        color: var(--bad);
      }
      .chip.warn {
        background: var(--warn-soft);
        color: var(--warn);
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .spread {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 520px) {
        .grid2 {
          grid-template-columns: 1fr;
        }
      }
      .pbar {
        height: 8px;
        background: var(--line);
        border-radius: 99px;
        overflow: hidden;
      }
      .pbar > i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 99px;
        transition: width 0.4s;
      }
      .divider {
        height: 1px;
        background: var(--line);
        margin: 14px 0;
      }
      /* ---------- Stats ---------- */
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 1em;
      }
      @media (max-width: 600px) {
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .stat {
        background: var(--card);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 14px;
        text-align: center;
      }
      .stat b {
        display: block;
        font-size: 24px;
        letter-spacing: -0.5px;
      }
      .stat span {
        font-size: 12px;
        color: var(--ink2);
        font-weight: 600;
      }
      .stat .em {
        color: var(--accent);
      }
      /* ---------- Exercises ---------- */
      .q-text {
        font-size: 17px;
        margin: 10px 0 14px;
        line-height: 1.6;
      }
      .q-text .gap {
        display: inline-block;
        min-width: 70px;
        border-bottom: 2px solid var(--accent);
        text-align: center;
        color: var(--accent);
        font-weight: 700;
      }
      .opts {
        display: grid;
        gap: 8px;
      }
      .opt {
        background: var(--bg);
        border: 2px solid transparent;
        border-radius: 12px;
        padding: 12px 14px;
        text-align: left;
        font-size: 15px;
        font-weight: 600;
        transition: all 0.12s;
        width: 100%;
      }
      .opt:hover {
        border-color: var(--accent2);
      }
      .opt.sel {
        border-color: var(--accent);
        background: var(--accent-soft);
      }
      .opt.right {
        border-color: var(--ok);
        background: var(--ok-soft);
      }
      .opt.wrong {
        border-color: var(--bad);
        background: var(--bad-soft);
      }
      .answer-in {
        width: 100%;
        padding: 12px 14px;
        border: 2px solid var(--line);
        border-radius: 12px;
        font-size: 16px;
        outline: none;
      }
      .answer-in:focus {
        border-color: var(--accent);
      }
      .answer-in.right {
        border-color: var(--ok);
        background: var(--ok-soft);
      }
      .answer-in.wrong {
        border-color: var(--bad);
        background: var(--bad-soft);
      }
      textarea.answer-in {
        min-height: 110px;
        resize: vertical;
        line-height: 1.5;
      }
      .feedback {
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 12px;
        font-size: 14px;
        display: none;
      }
      .feedback.show {
        display: block;
      }
      .feedback.ok {
        background: var(--ok-soft);
        color: #14532d;
      }
      .feedback.bad {
        background: var(--bad-soft);
        color: #7f1d1d;
      }
      .feedback b.fb-title {
        display: block;
        margin-bottom: 3px;
      }
      .exp-note {
        background: var(--warn-soft);
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 10px;
        font-size: 14px;
        color: #7c4a03;
      }
      /* ---------- Session ---------- */
      .sess-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        gap: 8px;
      }
      .sess-steps {
        display: flex;
        gap: 5px;
        flex: 1;
      }
      .sess-steps i {
        flex: 1;
        height: 6px;
        border-radius: 99px;
        background: var(--line);
      }
      .sess-steps i.done {
        background: var(--ok);
      }
      .sess-steps i.cur {
        background: var(--accent);
      }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: var(--ink2);
        font-size: 14px;
        white-space: nowrap;
      }
      .block-tag {
        font-size: 12px;
        font-weight: 800;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      /* ---------- Flashcards ---------- */
      .fcard {
        background: linear-gradient(135deg, #4f46e5, #7c6ff0);
        color: #fff;
        border-radius: 20px;
        padding: 34px 20px;
        text-align: center;
        min-height: 170px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-shadow: 0 10px 30px rgba(79, 70, 229, 0.35);
        margin-bottom: 14px;
      }
      .fcard .word {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .fcard .hint {
        opacity: 0.8;
        font-size: 14px;
        margin-top: 6px;
      }
      .fcard .back {
        margin-top: 12px;
        font-size: 17px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 10px;
      }
      .grade-btns {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }
      .grade-btns button {
        padding: 12px 6px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 13px;
      }
      .g0 {
        background: var(--bad-soft);
        color: var(--bad);
      }
      .g1 {
        background: var(--warn-soft);
        color: var(--warn);
      }
      .g2 {
        background: var(--ok-soft);
        color: var(--ok);
      }
      /* ---------- Lesson ---------- */
      .lesson-body {
        font-size: 15px;
      }
      .lesson-body h4 {
        margin: 16px 0 6px;
        font-size: 15px;
        color: var(--accent);
      }
      .lesson-body p {
        margin-bottom: 8px;
      }
      .lesson-body table {
        width: 100%;
        border-collapse: collapse;
        margin: 8px 0;
        font-size: 14px;
      }
      .lesson-body td,
      .lesson-body th {
        border: 1px solid var(--line);
        padding: 7px 9px;
        text-align: left;
      }
      .lesson-body th {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .ej {
        background: var(--bg);
        border-left: 3px solid var(--accent);
        border-radius: 0 10px 10px 0;
        padding: 9px 12px;
        margin: 8px 0;
        font-size: 14px;
      }
      .ej b {
        color: var(--accent);
      }
      .truco {
        background: var(--warn-soft);
        border-radius: 12px;
        padding: 11px 13px;
        margin: 8px 0;
        font-size: 14px;
        color: #7c4a03;
      }
      .truco::before {
        content: "💡 TRUCO · ";
        font-weight: 800;
        font-size: 11px;
        letter-spacing: 0.05em;
      }
      /* ---------- Charts ---------- */
      .chart-box {
        overflow-x: auto;
      }
      .chart-box svg {
        display: block;
        margin: 0 auto;
      }
      .legend {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        font-size: 12px;
        color: var(--ink2);
        margin-top: 8px;
        justify-content: center;
      }
      .legend i {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 3px;
        margin-right: 5px;
      }
      /* heatmap */
      .heat {
        display: grid;
        grid-auto-flow: column;
        grid-template-rows: repeat(7, 12px);
        gap: 3px;
        justify-content: start;
        padding: 4px 0;
      }
      .heat i {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        background: var(--line);
      }
      .heat i.l1 {
        background: #c9c4f7;
      }
      .heat i.l2 {
        background: #9b90ee;
      }
      .heat i.l3 {
        background: #6a5ce6;
      }
      .heat i.l4 {
        background: #4436c9;
      }
      /* ---------- Plan ---------- */
      .phase {
        margin-bottom: 6px;
      }
      .week-item {
        display: flex;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 12px;
        margin-bottom: 8px;
        background: var(--bg);
        align-items: flex-start;
      }
      .week-item.cur {
        background: var(--accent-soft);
        outline: 2px solid var(--accent);
      }
      .week-item.done {
        opacity: 0.65;
      }
      .wnum {
        background: var(--accent);
        color: #fff;
        font-weight: 800;
        font-size: 12px;
        border-radius: 9px;
        min-width: 34px;
        text-align: center;
        padding: 5px 0;
        margin-top: 2px;
      }
      .week-item.done .wnum {
        background: var(--ok);
      }
      /* ---------- Badges ---------- */
      .badges {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
        gap: 10px;
      }
      .badge {
        text-align: center;
        padding: 12px 6px;
        border-radius: 14px;
        background: var(--bg);
      }
      .badge .ic {
        font-size: 28px;
      }
      .badge b {
        display: block;
        font-size: 11px;
        margin-top: 4px;
      }
      .badge span {
        font-size: 10px;
        color: var(--ink3);
      }
      .badge.locked {
        filter: grayscale(1);
        opacity: 0.4;
      }
      /* ---------- Level scale ---------- */
      .lvl-scale {
        display: flex;
        border-radius: 10px;
        overflow: hidden;
        margin: 10px 0 4px;
        height: 34px;
      }
      .lvl-scale i {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 800;
        color: #fff;
        position: relative;
        opacity: 0.35;
      }
      .lvl-scale i.hit {
        opacity: 1;
      }
      .lvl-scale i:nth-child(1) {
        background: #94a3b8;
      }
      .lvl-scale i:nth-child(2) {
        background: #60a5fa;
      }
      .lvl-scale i:nth-child(3) {
        background: #818cf8;
      }
      .lvl-scale i:nth-child(4) {
        background: #7c3aed;
      }
      .lvl-scale i:nth-child(5) {
        background: #4c1d95;
      }
      /* ---------- Misc ---------- */
      .view {
        display: none;
      }
      .view.on {
        display: block;
      }
      .center {
        text-align: center;
      }
      .big-emoji {
        font-size: 52px;
        margin: 6px 0;
      }
      .speak-btn {
        background: var(--accent-soft);
        color: var(--accent);
        border-radius: 99px;
        width: 56px;
        height: 56px;
        font-size: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 6px;
      }
      .confetti {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
      }
      .fade-in {
        animation: fadeIn 0.35s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .summary-xp {
        font-size: 40px;
        font-weight: 800;
        color: var(--accent);
        letter-spacing: -1px;
      }
      .check-list label {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 8px 0;
        font-size: 14px;
        border-bottom: 1px solid var(--line);
      }
      .check-list input {
        width: 18px;
        height: 18px;
        margin-top: 2px;
        accent-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="logo">
          Inglés Diario 🇬🇧<small>Objetivo: Cambridge B2 / C1</small>
        </div>
        <div class="hdr-right">
          <div class="pill" id="hdr-streak">🔥 0</div>
          <div class="pill" id="hdr-level">—</div>
        </div>
      </div>
    </header>

    <nav id="mainnav" style="display: none">
      <button data-v="home" class="on"><span class="ic">🏠</span>Hoy</button>
      <button data-v="progress"><span class="ic">📈</span>Progreso</button>
      <button data-v="plan"><span class="ic">🗓️</span>Plan</button>
      <button data-v="vocab"><span class="ic">🃏</span>Vocab</button>
      <button data-v="more"><span class="ic">⚙️</span>Más</button>
    </nav>

    <div class="wrap">
      <div id="v-onboarding" class="view"></div>
      <div id="v-test" class="view"></div>
      <div id="v-home" class="view"></div>
      <div id="v-session" class="view"></div>
      <div id="v-progress" class="view"></div>
      <div id="v-plan" class="view"></div>
      <div id="v-vocab" class="view"></div>
      <div id="v-more" class="view"></div>
    </div>

    <script>
      /* ================================================================
   INGLÉS DIARIO — app de estudio diario de inglés para Emilio
   Todo en un archivo. Datos en localStorage.
   ================================================================ */

      /* ===DATA:TEST=== */
      const TEST_BANK = [
        // --- GRAMÁTICA (14) ---
        {
          sec: "grammar",
          lvl: "A2",
          tags: ["present-simple"],
          q: "She ___ to work by bus every day.",
          opts: ["go", "goes", "going", "is go"],
          a: 1,
        },
        {
          sec: "grammar",
          lvl: "A2",
          tags: ["past-simple"],
          q: "We ___ a great film last night.",
          opts: ["see", "have seen", "saw", "seen"],
          a: 2,
        },
        {
          sec: "grammar",
          lvl: "A2",
          tags: ["comparatives"],
          q: "This exercise is ___ than the last one.",
          opts: ["more easy", "easyer", "easier", "most easy"],
          a: 2,
        },
        {
          sec: "grammar",
          lvl: "B1",
          tags: ["present-perfect"],
          q: "I ___ in Madrid since 2019.",
          opts: ["live", "am living", "lived", "have lived"],
          a: 3,
        },
        {
          sec: "grammar",
          lvl: "B1",
          tags: ["future"],
          q: "Look at those clouds! It ___ rain.",
          opts: ["will", "is going to", "would", "shall"],
          a: 1,
        },
        {
          sec: "grammar",
          lvl: "B1",
          tags: ["conditionals"],
          q: "If I ___ more time, I would learn to play the guitar.",
          opts: ["have", "had", "would have", "will have"],
          a: 1,
        },
        {
          sec: "grammar",
          lvl: "B1",
          tags: ["modals"],
          q: "You ___ smoke in hospitals. It's forbidden.",
          opts: ["don't have to", "shouldn't", "mustn't", "couldn't"],
          a: 2,
        },
        {
          sec: "grammar",
          lvl: "B2",
          tags: ["present-perfect"],
          q: "By the time we arrived, the meeting ___ .",
          opts: [
            "already started",
            "has already started",
            "had already started",
            "was already starting",
          ],
          a: 2,
        },
        {
          sec: "grammar",
          lvl: "B2",
          tags: ["passive"],
          q: "The new bridge ___ next year.",
          opts: [
            "will build",
            "will be built",
            "is building",
            "will have built",
          ],
          a: 1,
        },
        {
          sec: "grammar",

<tr><td>Never / Rarely / Seldom</td><td>Rarely <b>do we see</b> such talent.</td></tr>

      /* ================= Estado ================= */
      const LS_KEY = "inglesDiario_v1";
      const LEVELS = ["A1", "A2", "B1", "B2", "C1"];
      const LEVEL_BOUNDS = {
        A1: [0, 20],
        A2: [20, 40],
        B1: [40, 60],
        B2: [60, 80],
        C1: [80, 100],
      };
      const SRS_INTERVALS = [0, 1, 3, 7, 15, 30];

      var ST = null;
      function defaultState() {
        return {
          v: 1,
          created: todayStr(),
          test: { done: false },
          levelScore: 50,
          levelHistory: [],
          skills: {
            grammar: 50,
            vocab: 50,
            reading: 50,
            listening: 50,
            writing: 50,
          },
          skillHistory: [],
          plan: null,
          planStart: null,
          history: {}, // 'YYYY-MM-DD' -> {min, xp, blocks:[], acc}
          srs: {}, // wordKey -> {box, due, seen, ok}
          vocabIntro: {}, // deckId -> nº palabras introducidas
          xp: 0,
          streak: 0,
          bestStreak: 0,
          lastDay: null,
          achievements: [],
          weakTags: {}, // tag -> {ok, tot}
          sessionDraft: null,
          settings: { voice: "", rate: 0.95 },
        };
      }
      function load() {
        try {
          const raw = localStorage.getItem(LS_KEY);
          ST = raw
            ? Object.assign(defaultState(), JSON.parse(raw))
            : defaultState();
        } catch (e) {
          ST = defaultState();
        }
      }
      function save() {
        localStorage.setItem(LS_KEY, JSON.stringify(ST));
      }

      /* ================= Utilidades ================= */
      function todayStr(d) {
        d = d || new Date();
        return (
          d.getFullYear() +
          "-" +
          String(d.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(d.getDate()).padStart(2, "0")
        );
      }
      function addDays(str, n) {
        const d = new Date(str + "T12:00:00");
        d.setDate(d.getDate() + n);
        return todayStr(d);
      }
      function daysBetween(a, b) {
        return Math.round(
          (new Date(b + "T12:00:00") - new Date(a + "T12:00:00")) / 86400000,
        );
      }
      function esc(s) {
        return String(s).replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );
      }
      function shuffle(a) {
        a = a.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }
      function pick(a, n) {
        return shuffle(a).slice(0, n);
      }
      function levelOf(score) {
        for (const l of LEVELS) {
          const [lo, hi] = LEVEL_BOUNDS[l];
          if (score >= lo && score < hi) return l;
        }
        return "C1";
      }
      function levelLabel(score) {
        const l = levelOf(score);
        const [lo, hi] = LEVEL_BOUNDS[l];
        const f = (score - lo) / (hi - lo);
        return l + (f < 0.33 ? " bajo" : f > 0.66 ? " alto" : "");
      }
      function normAns(s) {
        return String(s)
          .toLowerCase()
          .trim()
          .replace(/[.,;:!?"']/g, "")
          .replace(/’/g, "")
          .replace(/\s+/g, " ")
          .replace(/\bdo not\b/g, "dont")
          .replace(/\bdoes not\b/g, "doesnt")
          .replace(/\bdid not\b/g, "didnt")
          .replace(/\bis not\b/g, "isnt")
          .replace(/\bare not\b/g, "arent")
          .replace(/\bwas not\b/g, "wasnt")
          .replace(/\bwere not\b/g, "werent")
          .replace(/\bhave not\b/g, "havent")
          .replace(/\bhas not\b/g, "hasnt")
          .replace(/\bhad not\b/g, "hadnt")
          .replace(/\bwill not\b/g, "wont")
          .replace(/\bwould not\b/g, "wouldnt")
          .replace(/\bcannot\b/g, "cant")
          .replace(/\bcan not\b/g, "cant")
          .replace(/\bcould not\b/g, "couldnt")
          .replace(/\bshould not\b/g, "shouldnt")
          .replace(/\bmust not\b/g, "mustnt")
          .replace(/\bi am\b/g, "im")
          .replace(/\byou are\b/g, "youre")
          .replace(/\bhe is\b/g, "hes")
          .replace(/\bshe is\b/g, "shes")
          .replace(/\bit is\b/g, "its")
          .replace(/\bwe are\b/g, "were")
          .replace(/\bthey are\b/g, "theyre")
          .replace(/\bi have\b/g, "ive")
          .replace(/\bi will\b/g, "ill")
          .replace(/\bi would\b/g, "id")
          .replace(/\bthere is\b/g, "theres");
      }
      function checkAnswer(user, answers) {
        const u = normAns(user);
        return answers.some((a) => normAns(a) === u);
      }
      function speak(text, rate) {
        try {
          speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.lang = "en-GB";
          u.rate = rate || ST.settings.rate;
          const vs = speechSynthesis
            .getVoices()
            .filter((v) => v.lang.startsWith("en"));
          const pref = vs.find((v) => /en-GB/i.test(v.lang)) || vs[0];
          if (pref) u.voice = pref;
          speechSynthesis.speak(u);
        } catch (e) {}
      }
      /* registrar resultado en tags débiles */
      function tagResult(tags, ok) {
        (tags || []).forEach((t) => {
          if (!ST.weakTags[t]) ST.weakTags[t] = { ok: 0, tot: 0 };
          ST.weakTags[t].tot++;
          if (ok) ST.weakTags[t].ok++;
        });
      }
      function skillAdj(skill, ok, w) {
        w = w || 1;
        const cur = ST.skills[skill];
        const delta = ok ? (100 - cur) * 0.02 * w : -cur * 0.025 * w;
        ST.skills[skill] = Math.max(5, Math.min(99, cur + delta));
      }

        "onboarding",

        VIEWS.forEach((x) =>

      /* ================= Racha y XP ================= */
      function registerDay(min, xp, acc, blocks) {
        const t = todayStr();
        const h = ST.history[t] || {
          min: 0,
          xp: 0,
          blocks: [],
          accSum: 0,
          accN: 0,
        };
        h.min += min;
        h.xp += xp;
        h.blocks = h.blocks.concat(blocks || []);
        if (acc != null) {
          h.accSum = (h.accSum || 0) + acc;
          h.accN = (h.accN || 0) + 1;
        }
        ST.history[t] = h;
        ST.xp += xp;
        if (ST.lastDay !== t) {
          if (ST.lastDay && daysBetween(ST.lastDay, t) === 1) ST.streak++;
          else if (ST.lastDay && daysBetween(ST.lastDay, t) > 1) ST.streak = 1;
          else if (!ST.lastDay) ST.streak = 1;
          ST.lastDay = t;
          ST.bestStreak = Math.max(ST.bestStreak, ST.streak);
        }
        checkAchievements();
        save();
        updateHeader();
      }

        const secs = {

          tagResult(r.tags, r.ok);

        const ratio = t ? p / t : 0.5;
        // mapear a escala 0-100: test cubre A2..C1 → 20..92

      /* ================= Plan de 6 meses ================= */
      function buildPlan() {
        const lvl = levelOf(ST.levelScore);
        // punto de arranque en el currículo según nivel
        let startIdx = 0;
        if (lvl === "B1") startIdx = ST.levelScore >= 50 ? 4 : 2;
        if (lvl === "B2") startIdx = 10;
        if (lvl === "C1") startIdx = 16;
        const weeks = [];
        for (let i = 0; i < 26; i++) {
          const c = CURRICULUM[Math.min(startIdx + i, CURRICULUM.length - 1)];
          weeks.push({ w: i + 1, cid: c.id });
        }
        ST.plan = weeks;
        ST.planStart = todayStr();
      }
      function currentWeekIdx() {
        if (!ST.planStart) return 0;
        return Math.min(
          25,
          Math.floor(daysBetween(ST.planStart, todayStr()) / 7),
        );
      }
      function currentWeek() {
        return CURRICULUM.find((c) => c.id === ST.plan[currentWeekIdx()].cid);
      }
      function planDayIdx() {
        return daysBetween(ST.planStart, todayStr()) % 7;
      }

      function weakSummaryCard() {

          .filter(([, v]) => v.tot >= 3)

        const weak = tags.slice(0, 3).filter((x) => x.r < 0.75);

          .filter((x) => x.r >= 0.85)
          .slice(-3)
          .reverse();

    ${strong.length ? '<p class="muted" style="margin:10px 0 6px">Puntos fuertes:</p><p>' + strong.map((x) => `<span class="chip ok">${TAG_NAMES[x.k] || x.k} · ${Math.round(x.r * 100)}%</span>`).join(" ") + "</p>" : ""}

      /* ---------- SESIÓN DIARIA ---------- */
      var SESS = null,
        SESS_T0 = null,
        SESS_TIMER = null;

      function dueCards() {
        const t = todayStr();
        const out = [];
        for (const key in ST.srs) {
          if (ST.srs[key].due <= t) out.push(key);
        }
        return out;
      }
      function wordByKey(key) {
        const [deck, i] = key.split("|");
        return (VOCAB_DECKS[deck] || { words: [] }).words[+i];
      }
      function introduceWords(n) {
        // introducir palabras nuevas del mazo de la semana (y anteriores si se agota)
        const wi = currentWeekIdx();
        const decks = [];
        for (let k = wi; k >= 0; k--) {
          const c = CURRICULUM.find((x) => x.id === ST.plan[k].cid);
          if (c && !decks.includes(c.deck)) decks.push(c.deck);
        }
        Object.keys(VOCAB_DECKS).forEach((d) => {
          if (!decks.includes(d)) decks.push(d);
        });
        const out = [];
        for (const d of decks) {
          const deck = VOCAB_DECKS[d];
          if (!deck) continue;
          const intro = ST.vocabIntro[d] || 0;
          for (let i = intro; i < deck.words.length && out.length < n; i++) {
            const key = d + "|" + i;
            if (!ST.srs[key]) {
              ST.srs[key] = { box: 0, due: todayStr(), seen: 0, ok: 0 };
              out.push(key);
              ST.vocabIntro[d] = i + 1;
            }
          }
          if (out.length >= n) break;
        }
        return out;
      }
      function pickWeakExercises(n) {
        // ejercicios extra de lecciones ya vistas que tocan tags débiles
        const weak = Object.entries(ST.weakTags)
          .filter(([, v]) => v.tot >= 3 && v.ok / v.tot < 0.75)
          .map(([k]) => k);
        const seen = ST.plan
          .slice(0, currentWeekIdx() + 1)
          .map((p) => CURRICULUM.find((c) => c.id === p.cid));
        let pool = [];
        seen.forEach(
          (c) =>
            c &&
            c.lessons.forEach((lid) => {
              const L = LESSONS[lid];
              if (!L) return;
              L.ex.forEach((e) => {
                if ((e.tags || []).some((t) => weak.includes(t))) pool.push(e);
              });
            }),
        );
        if (pool.length < n) {
          seen.forEach(
            (c) =>
              c &&
              c.lessons.forEach((lid) => {
                const L = LESSONS[lid];
                if (L) pool = pool.concat(L.ex);
              }),
          );
        }
        return pick(pool, n);
      }
      function buildSession() {
        const wk = currentWeek(),
          di = planDayIdx();
        const lessonId =
          wk.lessons[di % 2 === 0 ? 0 : Math.min(1, wk.lessons.length - 1)];
        const L = LESSONS[lessonId];
        const items = [];
        // 1. VOCABULARIO (10 min)
        const due = pick(dueCards(), 12);
        const fresh = introduceWords(Math.max(4, 10 - due.length));
        const cards = shuffle(due.concat(fresh));
        if (cards.length)
          items.push({ block: "Vocabulario", min: 10, type: "vocab", cards });
        // 2. LECCIÓN (12 min) — días 1-4; día 5 repaso; día 6 examen; día 7 skip
        if (di <= 3 && L)
          items.push({
            block: "Lección",
            min: 12,
            type: "lesson",
            lesson: lessonId,
          });
        if (di === 4 && L)
          items.push({
            block: "Repaso",
            min: 10,
            type: "lesson",
            lesson: wk.lessons[0],
            review: true,
          });
        // 3. EJERCICIOS (15 min)
        let exs = [];
        if (di === 5) {
          // mini-examen semanal: preguntas de lecciones de la semana + banco por nivel
          wk.lessons.forEach((lid) => {
            const l = LESSONS[lid];
            if (l) exs = exs.concat(pick(l.ex, 5));
          });
          exs = exs.concat(
            pick(
              TRANSLATE_BANK.filter((x) => near(x.lvl)),
              4,
            ),
          );
          items.push({
            block: "Mini-examen semanal",
            min: 20,
            type: "ex",
            exs: shuffle(exs).slice(0, 14),
            exam: true,
          });
        } else {
          if (L) exs = exs.concat(pick(L.ex, 6));
          exs = exs.concat(pickWeakExercises(2));
          exs = exs.concat(
            pick(
              TRANSLATE_BANK.filter((x) => near(x.lvl)),
              2,
            ),
          );
          if (ST.levelScore >= 55)
            exs = exs.concat(
              pick(
                TRANSFORM_BANK.filter((x) => near(x.lvl)),
                2,
              ),
            );
          items.push({
            block: "Ejercicios",
            min: 15,
            type: "ex",
            exs: shuffle(exs).slice(0, 10),
          });
        }
        // 4. LISTENING (10 min; día 7 doble)
        const nLis = di === 6 ? 6 : 3,
          nDic = di === 6 ? 3 : 2;
        const lis = pick(
          LISTEN_BANK.filter((x) => near(x.lvl) && x.q),
          nLis,
        );
        const dic = pick(
          LISTEN_BANK.filter((x) => near(x.lvl) && x.dict),
          nDic,
        );
        items.push({
          block: "Listening",
          min: di === 6 ? 20 : 10,
          type: "listen",
          items: lis.concat(dic),
        });
        // 5. PRONUNCIACIÓN Y SPEAKING (8 min)
        const pron = pick(PRON_BANK, 2);
        const shad = pick(
          LISTEN_BANK.filter((x) => near(x.lvl)),
          3,
        ).map((x) => x.say);
        items.push({
          block: "Pronunciación",
          min: di === 6 ? 15 : 8,
          type: "pron",
          pairs: pron,
          shadow: shad,
        });
        // 6. WRITING (5 min) — no el día 7
        if (di !== 6)
          items.push({
            block: "Writing",
            min: 5,
            type: "writing",
            prompt:
              pick(
                WRITING_PROMPTS.filter((x) => near(x.lvl)),
                1,
              )[0] || WRITING_PROMPTS[0],
          });
        return { items, bi: 0, results: [], exam: di === 5 };
      }
      function near(lvl) {
        const me = levelOf(ST.levelScore);
        const order = { A2: 0, B1: 1, B2: 2, C1: 3 };
        return (
          Math.abs((order[lvl] ?? 1) - (order[me === "A1" ? "A2" : me] ?? 1)) <=
          1
        );
      }
      function startSession() {
        SESS = buildSession();
        SESS_T0 = Date.now();
        ST.sessionDraft = null;
        save();
        show("session", false);
        startTimer();
        renderBlock();
      }
      function resumeSession() {
        if (!ST.sessionDraft) return startSession();
        SESS = ST.sessionDraft;
        SESS_T0 = Date.now() - (SESS.elapsed || 0);
        show("session", false);
        startTimer();
        renderBlock();
      }
      function startTimer() {
        clearInterval(SESS_TIMER);
        SESS_TIMER = setInterval(() => {
          const s = Math.floor((Date.now() - SESS_T0) / 1000);
          const el = document.getElementById("sess-timer");
          if (el)
            el.textContent =
              String(Math.floor(s / 60)).padStart(2, "0") +
              ":" +
              String(s % 60).padStart(2, "0");
        }, 1000);
      }
      function saveDraft() {
        if (!SESS) return;
        SESS.elapsed = Date.now() - SESS_T0;
        ST.sessionDraft = SESS;
        save();
      }
      function sessHeader() {
        const steps = SESS.items
          .map(
            (it, i) =>
              `<i class="${i < SESS.bi ? "done" : i === SESS.bi ? "cur" : ""}"></i>`,
          )
          .join("");
        const cur = SESS.items[SESS.bi];
        return `<div class="sess-head">
    <button class="btn ghost small" onclick="exitSession()">✕</button>
    <div class="sess-steps">${steps}</div>
    <span class="timer" id="sess-timer">00:00</span>
  </div>
  <div class="spread" style="margin-bottom:8px">
    <span class="block-tag">${cur.block}</span><span class="tiny">~${cur.min} min</span>
  </div>`;
      }
      function exitSession() {
        saveDraft();
        clearInterval(SESS_TIMER);
        show("home");
      }
      function nextBlock() {
        SESS.bi++;
        saveDraft();
        if (SESS.bi >= SESS.items.length) finishSession();
        else renderBlock();
      }
      function renderBlock() {
        const el = document.getElementById("v-session");
        const it = SESS.items[SESS.bi];
        if (it.type === "vocab") renderVocabBlock(el, it);
        if (it.type === "lesson") renderLessonBlock(el, it);
        if (it.type === "ex") renderExBlock(el, it);
        if (it.type === "listen") renderListenBlock(el, it);
        if (it.type === "pron") renderPronBlock(el, it);
        if (it.type === "writing") renderWritingBlock(el, it);
        window.scrollTo(0, 0);
      }

      /* --- Bloque: vocabulario SRS --- */
      function renderVocabBlock(el, it) {
        it.i = it.i || 0;
        if (it.i >= it.cards.length) {
          nextBlock();
          return;
        }
        const key = it.cards[it.i];
        const w = wordByKey(key);
        if (!w) {
          it.i++;
          return renderVocabBlock(el, it);
        }
        const rec = ST.srs[key];
        const typed = rec.box >= 2 && it.i % 2 === 1; // alternar: escribir la palabra
        it.typed = typed;
        it.key = key;
        el.innerHTML = `<div class="card fade-in">${sessHeader()}
    <p class="tiny center" style="margin-bottom:8px">Tarjeta ${it.i + 1} de ${it.cards.length} · caja ${rec.box}/5</p>
    ${
      typed
        ? `
      <div class="fcard"><div class="hint">¿Cómo se dice en inglés?</div><div class="word" style="font-size:24px">${esc(w.es)}</div></div>
      <input class="answer-in" id="vin" placeholder="Escribe la palabra en inglés..." autocomplete="off" onkeydown="if(event.key==='Enter')gradeTyped()">
      <div style="margin-top:10px"><button class="btn wfull" onclick="gradeTyped()">Comprobar</button></div>
      <div class="feedback" id="vfb"></div>
    `
        : `
      <div class="fcard" id="fc">
        <div class="word">${esc(w.en)}</div>
        <div class="hint">${w.pron ? "/" + esc(w.pron) + "/ · " : ""}toca 🔊 para escucharla</div>
        <div class="back" id="fback" style="display:none"><b>${esc(w.es)}</b><br><span style="opacity:.9;font-size:14px">${esc(w.ex || "")}</span></div>
      </div>
      <div class="center" style="margin-bottom:10px">
        <button class="speak-btn" onclick="speak('${esc(w.en).replace(/'/g, "\\'")}. ${esc(w.ex || "").replace(/'/g, "\\'")}')">🔊</button>
        <button class="btn sec" id="revealb" onclick="document.getElementById('fback').style.display='block';document.getElementById('gradebtns').style.display='grid';this.style.display='none'">Mostrar significado</button>
      </div>
      <div class="grade-btns" id="gradebtns" style="display:none">
        <button class="g0" onclick="gradeCard(0)">😕 No la sabía</button>
        <button class="g1" onclick="gradeCard(1)">🤔 Dudé</button>
        <button class="g2" onclick="gradeCard(2)">😎 La sé</button>
      </div>
    `
    }
  </div>`;
        if (!typed) setTimeout(() => speak(w.en, 0.9), 350);
      }
      function srsApply(key, grade) {
        // 0 mal, 1 duda, 2 bien
        const r = ST.srs[key];
        r.seen++;
        if (grade === 0) {
          r.box = Math.max(0, r.box - 1);
        } else if (grade === 1) {
          /* misma caja */
        } else {
          r.box = Math.min(5, r.box + 1);
          r.ok++;
        }
        r.due = addDays(todayStr(), SRS_INTERVALS[r.box]);
        skillAdj("vocab", grade === 2, 0.4);
      }
      function gradeCard(g) {
        const it = SESS.items[SESS.bi];
        srsApply(it.key, g);
        SESS.results.push({ sec: "vocab", ok: g === 2 });
        it.i++;
        save();
        renderVocabBlock(document.getElementById("v-session"), it);
      }
      function gradeTyped() {
        const it = SESS.items[SESS.bi];
        const w = wordByKey(it.key);
        const val = document.getElementById("vin").value;
        if (!val.trim()) return;
        const ok = checkAnswer(val, [w.en].concat(w.alt || []));
        const fb = document.getElementById("vfb");
        fb.className = "feedback show " + (ok ? "ok" : "bad");
        fb.innerHTML = ok
          ? `<b class="fb-title">✓ ¡Bien!</b> ${esc(w.en)} — ${esc(w.ex || "")}`
          : `<b class="fb-title">✗ Era: ${esc(w.en)}</b> ${esc(w.ex || "")}`;
        document.getElementById("vin").className =
          "answer-in " + (ok ? "right" : "wrong");
        speak(w.en, 0.9);
        srsApply(it.key, ok ? 2 : 0);
        SESS.results.push({ sec: "vocab", ok });
        save();
        setTimeout(
          () => {
            it.i++;
            renderVocabBlock(document.getElementById("v-session"), it);
          },
          ok ? 1100 : 2400,
        );
      }

      /* --- Bloque: lección --- */
      function renderLessonBlock(el, it) {
        const L = LESSONS[it.lesson];
        el.innerHTML = `<div class="card fade-in">${sessHeader()}
    <h2>${it.review ? "Repaso: " : ""}${esc(L.title)} <span class="chip">${L.lvl}</span></h2>
    <div class="lesson-body">${L.body}</div>
    <div class="divider"></div>
    <button class="btn wfull" onclick="nextBlock()">Entendido, a practicar ✍️</button>
  </div>`;
      }

      /* --- Bloque: ejercicios --- */
      function renderExBlock(el, it) {
        it.i = it.i || 0;
        if (it.i >= it.exs.length) {
          if (it.exam) applyExamResult(it);
          nextBlock();
          return;
        }
        const e = it.exs[it.i];
        let inner = "";
        if (e.t === "mc") {
          inner =
            `<p class="q-text">${fmtGap(e.q)}</p><div class="opts">` +
            e.opts
              .map(
                (o, i) =>
                  `<button class="opt" onclick="ansMC(${i})">${esc(o)}</button>`,
              )
              .join("") +
            `</div>`;
        } else if (e.t === "gap") {
          inner = `<p class="q-text">${fmtGap(e.q)}</p>
      ${e.hint ? `<p class="tiny" style="margin-bottom:8px">Pista: ${esc(e.hint)}</p>` : ""}
      <input class="answer-in" id="exin" placeholder="Tu respuesta..." autocomplete="off" autocapitalize="off" onkeydown="if(event.key==='Enter')ansText()">
      <div style="margin-top:10px"><button class="btn wfull" onclick="ansText()">Comprobar</button></div>`;
        } else if (e.t === "tr") {
          inner = `<p class="tiny" style="text-transform:uppercase;letter-spacing:.05em;font-weight:800;color:var(--accent)">Traduce al inglés</p>
      <p class="q-text">«${esc(e.q)}»</p>
      <input class="answer-in" id="exin" placeholder="In English..." autocomplete="off" autocapitalize="off" onkeydown="if(event.key==='Enter')ansText()">
      <div style="margin-top:10px"><button class="btn wfull" onclick="ansText()">Comprobar</button></div>`;
        } else if (e.t === "transform") {
          inner = `<p class="tiny" style="text-transform:uppercase;letter-spacing:.05em;font-weight:800;color:var(--accent)">Key word transformation (estilo Cambridge)</p>
      <p class="q-text">${esc(e.q)}</p>
      <p style="font-weight:800;margin-bottom:6px">Palabra clave: <span class="chip">${esc(e.key)}</span></p>
      <p class="q-text">${fmtGap(e.prompt)}</p>
      <input class="answer-in" id="exin" placeholder="2-5 palabras, usando la palabra clave..." autocomplete="off" autocapitalize="off" onkeydown="if(event.key==='Enter')ansText()">
      <div style="margin-top:10px"><button class="btn wfull" onclick="ansText()">Comprobar</button></div>`;
        }
        el.innerHTML = `<div class="card fade-in">${sessHeader()}
    <p class="tiny" style="margin-bottom:4px">Ejercicio ${it.i + 1} de ${it.exs.length}</p>
    ${inner}
    <div class="feedback" id="exfb"></div>
    <div id="exnext" style="display:none;margin-top:12px"><button class="btn wfull" onclick="exAdvance()">Siguiente →</button></div>
  </div>`;
        const inp = document.getElementById("exin");
        if (inp) inp.focus();
      }
      function fmtGap(s) {
        return esc(s).replace(
          /___+/g,
          '<span class="gap">&nbsp;___&nbsp;</span>',
        );
      }
      function curEx() {
        const it = SESS.items[SESS.bi];
        return it.exs[it.i];
      }
      function exResult(ok, correctShown) {
        const e = curEx();
        const it = SESS.items[SESS.bi];
        tagResult(e.tags, ok);
        const skill =
          e.t === "tr" || e.t === "transform"
            ? "writing"
            : e.skill || "grammar";
        skillAdj(skill, ok, 0.6);
        SESS.results.push({ sec: "ex", ok, exam: !!it.exam, lvl: e.lvl });
        const fb = document.getElementById("exfb");
        fb.className = "feedback show " + (ok ? "ok" : "bad");
        fb.innerHTML =
          (ok
            ? '<b class="fb-title">✓ ¡Correcto!</b>'
            : `<b class="fb-title">✗ Respuesta: ${esc(correctShown)}</b>`) +
          (e.exp ? " " + e.exp : "");
        document.getElementById("exnext").style.display = "block";
        save();
      }
      function ansMC(i) {
        const e = curEx();
        document.querySelectorAll("#v-session .opt").forEach((b, j) => {
          b.disabled = true;
          if (j === e.a) b.classList.add("right");
          else if (j === i) b.classList.add("wrong");
        });
        exResult(i === e.a, e.opts[e.a]);
      }
      function ansText() {
        const e = curEx();
        const inp = document.getElementById("exin");
        if (!inp.value.trim()) return;
        const ok = checkAnswer(inp.value, e.a);
        inp.className = "answer-in " + (ok ? "right" : "wrong");
        inp.disabled = true;
        exResult(ok, e.a[0]);
      }
      function exAdvance() {
        const it = SESS.items[SESS.bi];
        it.i++;
        renderExBlock(document.getElementById("v-session"), it);
      }
      function applyExamResult(it) {
        const rs = SESS.results.filter((r) => r.exam);
        if (!rs.length) return;
        const acc = rs.filter((r) => r.ok).length / rs.length;
        const delta = Math.round((acc - 0.62) * 8);
        ST.levelScore = Math.max(15, Math.min(97, ST.levelScore + delta));
        ST.levelHistory.push({ d: todayStr(), s: ST.levelScore });
        save();
      }

      /* --- Bloque: listening --- */
      function renderListenBlock(el, it) {
        it.i = it.i || 0;
        if (it.i >= it.items.length) {
          nextBlock();
          return;
        }
        const e = it.items[it.i];
        const isDict = !!e.dict;
        el.innerHTML = `<div class="card fade-in">${sessHeader()}
    <p class="tiny" style="margin-bottom:4px">Audio ${it.i + 1} de ${it.items.length} · nivel ${e.lvl}</p>
    <div class="center">
      <button class="speak-btn" onclick="speak(SESS.items[SESS.bi].items[${it.i}].say)">🔊</button>
      <button class="speak-btn" title="más lento" style="font-size:16px" onclick="speak(SESS.items[SESS.bi].items[${it.i}].say, 0.65)">🐢</button>
      <p class="tiny">Escucha las veces que necesites (🐢 = lento)</p>
    </div>
    ${
      isDict
        ? `
      <p class="q-text" style="text-align:center">✏️ <b>Dictado:</b> escribe exactamente lo que oyes</p>
      <input class="answer-in" id="exin" placeholder="Escribe la frase..." autocomplete="off" autocapitalize="off" onkeydown="if(event.key==='Enter')ansListen()">
      <div style="margin-top:10px"><button class="btn wfull" onclick="ansListen()">Comprobar</button></div>
    `
        : `
      <p class="q-text">${esc(e.q)}</p>
      <div class="opts">${e.opts.map((o, i) => `<button class="opt" onclick="ansListenMC(${i})">${esc(o)}</button>`).join("")}</div>
    `
    }
    <div class="feedback" id="exfb"></div>
    <div id="exnext" style="display:none;margin-top:12px"><button class="btn wfull" onclick="listenAdvance()">Siguiente →</button></div>
  </div>`;
        setTimeout(() => speak(e.say), 400);
      }
      function ansListenMC(i) {
        const it = SESS.items[SESS.bi];
        const e = it.items[it.i];
        document.querySelectorAll("#v-session .opt").forEach((b, j) => {
          b.disabled = true;
          if (j === e.a) b.classList.add("right");
          else if (j === i) b.classList.add("wrong");
        });
        const ok = i === e.a;
        skillAdj("listening", ok, 0.8);
        tagResult(["listening"], ok);
        SESS.results.push({ sec: "listening", ok });
        const fb = document.getElementById("exfb");
        fb.className = "feedback show " + (ok ? "ok" : "bad");
        fb.innerHTML =
          (ok
            ? '<b class="fb-title">✓ ¡Correcto!</b> '
            : '<b class="fb-title">✗</b> ') +
          "Texto: “" +
          esc(e.say) +
          "”" +
          (e.exp ? "<br>" + e.exp : "");
        document.getElementById("exnext").style.display = "block";
        save();
      }
      function ansListen() {
        const it = SESS.items[SESS.bi];
        const e = it.items[it.i];
        const inp = document.getElementById("exin");
        if (!inp.value.trim()) return;
        // dictado: comparar palabras
        const said = normAns(e.say).split(" ");
        const user = normAns(inp.value).split(" ");
        let hits = 0;
        const used = new Set();
        user.forEach((w) => {
          const j = said.findIndex((s, k) => s === w && !used.has(k));
          if (j >= 0) {
            hits++;
            used.add(j);
          }
        });
        const score = hits / said.length;
        const ok = score >= 0.8;
        inp.className = "answer-in " + (ok ? "right" : "wrong");
        inp.disabled = true;
        skillAdj("listening", ok, 0.8);
        tagResult(["dictation"], ok);
        SESS.results.push({ sec: "listening", ok });
        const fb = document.getElementById("exfb");
        fb.className = "feedback show " + (ok ? "ok" : "bad");
        fb.innerHTML = `<b class="fb-title">${ok ? "✓" : "✗"} ${Math.round(score * 100)}% de las palabras</b> Texto: “${esc(e.say)}”`;
        document.getElementById("exnext").style.display = "block";
        save();
      }
      function listenAdvance() {
        const it = SESS.items[SESS.bi];
        it.i++;
        renderListenBlock(document.getElementById("v-session"), it);
      }

      /* --- Bloque: pronunciación y speaking --- */
      var REC = null;
      function speechAvailable() {
        return (
          "webkitSpeechRecognition" in window || "SpeechRecognition" in window
        );
      }
      function renderPronBlock(el, it) {
        it.stage = it.stage || 0; // 0..pairs, luego shadow
        const nP = it.pairs.length;
        if (it.stage < nP) {
          const p = it.pairs[it.stage];
          el.innerHTML = `<div class="card fade-in">${sessHeader()}
      <h2>🎯 Sonido: ${esc(p.title)}</h2>
      <p class="muted">${p.tip}</p>
      <div class="divider"></div>
      <p class="tiny" style="font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:8px">Pares mínimos — escucha y repite en voz alta</p>
      ${p.pairs
        .map(
          (pr, i) => `
        <div class="spread" style="background:var(--bg);border-radius:12px;padding:10px 14px;margin-bottom:8px">
          <span style="font-weight:700">${esc(pr[0])} <span class="tiny">/${esc(pr[1])}/</span> — ${esc(pr[2])} <span class="tiny">/${esc(pr[3])}/</span></span>
          <button class="btn sec small" onclick="speak('${pr[0]}... ${pr[2]}. ${pr[0]}... ${pr[2]}',0.8)">🔊</button>
        </div>`,
        )
        .join("")}
      <div class="exp-note">${p.truco}</div>
      <div class="divider"></div>
      <button class="btn wfull" onclick="pronNext()">Siguiente →</button>
    </div>`;
        } else {
          const si = it.stage - nP;
          if (si >= it.shadow.length) {
            nextBlock();
            return;
          }
          const sent = it.shadow[si];
          el.innerHTML = `<div class="card fade-in">${sessHeader()}
      <h2>🗣️ Shadowing ${si + 1}/${it.shadow.length}</h2>
      <p class="muted">Escucha la frase y repítela en voz alta imitando ritmo y entonación. ${speechAvailable() ? "Luego pulsa 🎙️ y dila: comprobaré lo que se te entiende." : "(Tu navegador no soporta reconocimiento de voz: autoevalúate.)"}</p>
      <div class="fcard" style="min-height:110px"><div class="word" style="font-size:19px;line-height:1.5">${esc(sent)}</div></div>
      <div class="center">
        <button class="speak-btn" onclick="speak(SESS.items[SESS.bi].shadow[${si}])">🔊</button>
        <button class="speak-btn" style="font-size:16px" onclick="speak(SESS.items[SESS.bi].shadow[${si}],0.65)">🐢</button>
        ${speechAvailable() ? `<button class="speak-btn" style="background:var(--bad-soft);color:var(--bad)" id="micbtn" onclick="startRec(${si})">🎙️</button>` : ""}
      </div>
      <div class="feedback" id="exfb"></div>
      <div style="margin-top:12px" class="grid2">
        <button class="btn sec" onclick="pronSelf(false)">Me ha costado 😅</button>
        <button class="btn" onclick="pronSelf(true)">¡Clavada! →</button>
      </div>
    </div>`;
          setTimeout(() => speak(sent), 400);
        }
      }
      function pronNext() {
        const it = SESS.items[SESS.bi];
        it.stage++;
        renderPronBlock(document.getElementById("v-session"), it);
      }
      function pronSelf(ok) {
        skillAdj("listening", ok, 0.3);
        SESS.results.push({ sec: "speaking", ok });
        save();
        pronNext();
      }
      function startRec(si) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        try {
          REC = new SR();
          REC.lang = "en-GB";
          REC.interimResults = false;
          const btn = document.getElementById("micbtn");
          btn.textContent = "⏺️";
          REC.onresult = (ev) => {
            const heard = ev.results[0][0].transcript;
            const target = normAns(SESS.items[SESS.bi].shadow[si]).split(" ");
            const got = normAns(heard).split(" ");
            let hits = 0;
            const used = new Set();
            got.forEach((w) => {
              const j = target.findIndex((s, k) => s === w && !used.has(k));
              if (j >= 0) {
                hits++;
                used.add(j);
              }
            });
            const pct = Math.round((hits / target.length) * 100);
            const fb = document.getElementById("exfb");
            fb.className = "feedback show " + (pct >= 75 ? "ok" : "bad");
            fb.innerHTML = `<b class="fb-title">🎙️ Se te ha entendido: “${esc(heard)}”</b> Coincidencia: ${pct}%${pct >= 75 ? " — ¡buena pronunciación!" : " — vuelve a escuchar y prueba otra vez"}`;
            btn.textContent = "🎙️";
          };
          REC.onerror = () => {
            const b = document.getElementById("micbtn");
            if (b) b.textContent = "🎙️";
          };
          REC.onend = () => {
            const b = document.getElementById("micbtn");
            if (b) b.textContent = "🎙️";
          };
          REC.start();
        } catch (e) {}
      }

      /* --- Bloque: writing --- */
      function renderWritingBlock(el, it) {
        const p = it.prompt;
        el.innerHTML = `<div class="card fade-in">${sessHeader()}
    <h2>📝 Mini-writing</h2>
    <p class="q-text">${esc(p.q)}</p>
    <p class="tiny" style="margin-bottom:8px">Objetivo: ${p.words || "40-60"} palabras. Intenta usar: ${(p.use || []).map((u) => `<span class="chip">${esc(u)}</span>`).join(" ")}</p>
    <textarea class="answer-in" id="wrin" placeholder="Write here in English..."></textarea>
    <div style="margin-top:10px"><button class="btn wfull" onclick="checkWriting()">He terminado</button></div>
    <div id="wrcheck"></div>
  </div>`;
      }
      function checkWriting() {
        const it = SESS.items[SESS.bi];
        const txt = document.getElementById("wrin").value.trim();
        const wc = txt ? txt.split(/\s+/).length : 0;
        if (wc < 15) {
          alert("Escribe un poco más (mínimo ~15 palabras) para que cuente 😉");
          return;
        }
        const p = it.prompt;
        const usados = (p.use || []).filter((u) =>
          new RegExp(
            u
              .split("/")[0]
              .trim()
              .replace(/[^a-z ]/gi, ""),
            "i",
          ).test(txt),
        );
        document.getElementById("wrcheck").innerHTML = `
    <div class="feedback show ok" style="display:block">
      <b class="fb-title">✓ ${wc} palabras${usados.length ? ` · has usado: ${usados.join(", ")}` : ""}</b>

      function finishWriting(wc) {
        skillAdj("writing", true, 0.5);
        SESS.results.push({ sec: "writing", ok: true });
        save();
        nextBlock();
      }

      /* --- Fin de sesión --- */
      function finishSession() {
        clearInterval(SESS_TIMER);
        const min = Math.max(
          5,
          Math.min(90, Math.round((Date.now() - SESS_T0) / 60000)),
        );
        const rs = SESS.results;
        const acc = rs.length ? rs.filter((r) => r.ok).length / rs.length : 0;
        let xp = Math.round(rs.length * 6 + acc * 60 + (min >= 45 ? 40 : 20));
        const bonusStreak = (ST.streak + 1) % 7 === 0 ? 50 : 0;
        xp += bonusStreak;
        // deriva del nivel: pequeña, por precisión (el examen semanal ya hizo su ajuste)
        if (!SESS.exam) {
          const drift = (acc - 0.65) * 1.6;
          ST.levelScore = Math.max(15, Math.min(97, ST.levelScore + drift));
        }
        ST.levelHistory.push({
          d: todayStr(),
          s: Math.round(ST.levelScore * 10) / 10,
        });
        if (ST.levelHistory.length > 400)
          ST.levelHistory = ST.levelHistory.slice(-400);
        ST.skillHistory.push({
          d: todayStr(),
          sk: Object.assign({}, ST.skills),
        });
        if (ST.skillHistory.length > 400)
          ST.skillHistory = ST.skillHistory.slice(-400);
        ST.sessionDraft = null;
        registerDay(min, xp, acc, ["sessionDone"]);
        const newAch = ACHIEVEMENTS.filter(
          (a) =>
            ST.achievements.includes(a.id) &&
            !(SESS.startAch || []).includes(a.id),
        );
        const el = document.getElementById("v-session");
        const secStats = {};
        rs.forEach((r) => {
          if (!secStats[r.sec]) secStats[r.sec] = { ok: 0, t: 0 };
          secStats[r.sec].t++;
          if (r.ok) secStats[r.sec].ok++;
        });
        const secNames = {
          vocab: "🃏 Vocabulario",
          ex: "✍️ Ejercicios",
          listening: "🎧 Listening",
          speaking: "🗣️ Speaking",
          writing: "📝 Writing",
        };
        el.innerHTML = `<div class="card center fade-in">
    <div class="big-emoji">${acc >= 0.8 ? "🌟" : acc >= 0.6 ? "💪" : "🌱"}</div>
    <h2>¡Sesión completada!</h2>
    <div class="summary-xp">+${xp} XP</div>
    ${bonusStreak ? `<p class="chip ok">🎁 +${bonusStreak} XP por semana completa</p>` : ""}
    <p class="muted">${min} min · precisión ${Math.round(acc * 100)}% · racha 🔥 ${ST.streak}</p>
    <div class="divider"></div>
    <div style="text-align:left">
      ${Object.entries(secStats)
        .map(
          ([k, v]) => `
        <div class="spread" style="margin:6px 0">
          <span style="font-size:14px;font-weight:600">${secNames[k] || k}</span>
          <span style="font-size:14px"><b>${v.ok}</b>/${v.t}</span>
        </div>`,
        )
        .join("")}
    </div>
    <div class="divider"></div>
    <p class="muted" style="margin-bottom:12px">Nivel estimado: <b>${levelLabel(ST.levelScore)}</b> (${Math.round(ST.levelScore)}/100)</p>
    <div class="grid2">
      <button class="btn sec" onclick="show('progress')">Ver progreso 📈</button>
      <button class="btn" onclick="show('home')">Hecho por hoy ✓</button>
    </div>
  </div>`;
      }

      /* ---------- PROGRESO ---------- */
      function renderProgress() {
        const el = document.getElementById("v-progress");
        el.innerHTML = `
  <div class="stats fade-in">
    <div class="stat"><b class="em">🔥 ${ST.streak}</b><span>racha actual</span></div>
    <div class="stat"><b>🏅 ${ST.bestStreak}</b><span>mejor racha</span></div>
    <div class="stat"><b>${masteredWords()}</b><span>palabras dominadas</span></div>
    <div class="stat"><b>${Math.round((totalMin() / 60) * 10) / 10} h</b><span>total estudiado</span></div>
  </div>
  <div class="card">
    <h2>Evolución de nivel</h2>
    <div class="lvl-scale">${LEVELS.map((l) => `<i class="${l === levelOf(ST.levelScore) ? "hit" : ""}">${l}</i>`).join("")}</div>
    <div class="chart-box">${lineChart()}</div>
  </div>
  <div class="card">
    <h2>Destrezas</h2>
    <div class="chart-box">${radarChart()}</div>
    <p class="tiny center">Estimación 0-100 por destreza según tus resultados</p>
  </div>
  <div class="card">
    <h2>Puntos débiles y fuertes</h2>
    ${weakTable()}
  </div>
  <div class="card">
    <h2>Constancia · últimas 18 semanas</h2>
    <div class="heat" id="heatmap">${heatmap()}</div>
    <div class="legend"><span><i style="background:var(--line)"></i>0 min</span><span><i style="background:#c9c4f7"></i>&lt;20</span><span><i style="background:#9b90ee"></i>&lt;40</span><span><i style="background:#6a5ce6"></i>&lt;60</span><span><i style="background:#4436c9"></i>60+</span></div>
  </div>
  <div class="card">
    <h2>Minutos · últimos 14 días</h2>
    <div class="chart-box">${barChart()}</div>
  </div>
  <div class="card">
    <h2>Logros</h2>
    <div class="badges">
      ${ACHIEVEMENTS.map((a) => `<div class="badge ${ST.achievements.includes(a.id) ? "" : "locked"}"><div class="ic">${a.ic}</div><b>${a.n}</b><span>${a.d}</span></div>`).join("")}
    </div>
  </div>`;
        const hm = document.getElementById("heatmap");
        if (hm) hm.scrollLeft = hm.scrollWidth;
      }
      function lineChart() {
        const H = ST.levelHistory.length
          ? ST.levelHistory
          : [{ d: todayStr(), s: ST.levelScore }];
        const W = 640,
          Ht = 220,
          pl = 34,
          pr = 10,
          pt = 10,
          pb = 24;
        const n = H.length;
        const x = (i) =>
          pl + (n < 2 ? (W - pl - pr) / 2 : (i * (W - pl - pr)) / (n - 1));
        const y = (v) => pt + ((100 - v) / 100) * (Ht - pt - pb);
        let grid = "";
        [
          ["A2", 20],
          ["B1", 40],
          ["B2", 60],
          ["C1", 80],
        ].forEach(([l, v]) => {
          grid += `<line x1="${pl}" y1="${y(v)}" x2="${W - pr}" y2="${y(v)}" stroke="#e6e8f2" stroke-dasharray="4 4"/><text x="4" y="${y(v) + 4}" font-size="11" fill="#9aa0b8">${l}</text>`;
        });
        const pts = H.map((h, i) => `${x(i)},${y(h.s)}`).join(" ");
        const area =
          `M ${x(0)},${y(H[0].s)} ` +
          H.map((h, i) => `L ${x(i)},${y(h.s)}`).join(" ") +
          ` L ${x(n - 1)},${Ht - pb} L ${x(0)},${Ht - pb} Z`;
        const dots =
          n <= 40
            ? H.map(
                (h, i) =>
                  `<circle cx="${x(i)}" cy="${y(h.s)}" r="3.5" fill="#4f46e5"/>`,
              ).join("")
            : "";
        return `<svg viewBox="0 0 ${W} ${Ht}" width="100%" style="max-width:${W}px">
    ${grid}
    <path d="${area}" fill="#4f46e5" opacity="0.08"/>
    <polyline points="${pts}" fill="none" stroke="#4f46e5" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${W - pr}" y="${y(H[n - 1].s) - 8}" font-size="13" font-weight="700" fill="#4f46e5" text-anchor="end">${Math.round(H[n - 1].s)}</text>
  </svg>`;
      }
      function radarChart() {
        const sk = ST.skills;
        const axes = [
          ["grammar", "Gramática"],
          ["vocab", "Vocabulario"],
          ["reading", "Reading"],
          ["listening", "Listening"],
          ["writing", "Writing"],
        ];
        const cx = 170,
          cy = 150,
          R = 105,
          W = 340,
          H = 290;
        const pt = (i, r) => {
          const a = -Math.PI / 2 + (i * 2 * Math.PI) / axes.length;
          return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
        };
        let rings = "";
        [0.25, 0.5, 0.75, 1].forEach((f) => {
          rings +=
            '<polygon points="' +
            axes.map((_, i) => pt(i, R * f).join(",")).join(" ") +
            `" fill="none" stroke="#e6e8f2"/>`;
        });
        let spokes = "",
          labels = "";
        axes.forEach(([k, n], i) => {
          const [x, y] = pt(i, R);
          const [lx, ly] = pt(i, R + 24);
          spokes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e6e8f2"/>`;
          labels += `<text x="${lx}" y="${ly + 4}" font-size="12" font-weight="600" fill="#5a5f78" text-anchor="middle">${n}</text>
               <text x="${lx}" y="${ly + 18}" font-size="11" font-weight="800" fill="#4f46e5" text-anchor="middle">${Math.round(sk[k])}</text>`;
        });
        const poly = axes
          .map(([k], i) => pt(i, (R * sk[k]) / 100).join(","))
          .join(" ");
        return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">
    ${rings}${spokes}
    <polygon points="${poly}" fill="#4f46e5" opacity="0.18" stroke="#4f46e5" stroke-width="2.5"/>
    ${labels}
  </svg>`;
      }
      function weakTable() {
        const tags = Object.entries(ST.weakTags)
          .filter(([, v]) => v.tot >= 3)
          .map(([k, v]) => ({ k, r: v.ok / v.tot, tot: v.tot }))
          .sort((a, b) => a.r - b.r);
        if (!tags.length)
          return '<p class="muted">Aún no hay datos suficientes: completa algunas sesiones.</p>';
        return tags
          .slice(0, 10)
          .map(
            (x) => `
    <div class="spread" style="margin:7px 0">
      <span style="font-size:13px;font-weight:600;flex:1">${TAG_NAMES[x.k] || x.k} <span class="tiny">(${x.tot})</span></span>
      <div class="pbar" style="flex:1"><i style="width:${Math.round(x.r * 100)}%;background:${x.r < 0.6 ? "#dc2626" : x.r < 0.75 ? "#d97706" : "#16a34a"}"></i></div>
      <b style="font-size:13px;width:42px;text-align:right">${Math.round(x.r * 100)}%</b>
    </div>`,
          )
          .join("");
      }
      function heatmap() {
        const days = 18 * 7;
        const today = todayStr();
        let cells = "";
        // alinear al lunes
        const start0 = addDays(today, -(days - 1));
        const dow = (new Date(start0 + "T12:00:00").getDay() + 6) % 7;
        const start = addDays(start0, -dow);
        const total = days + dow;
        for (let i = 0; i < total; i++) {
          const d = addDays(start, i);
          if (d > today) {
            cells += '<i style="opacity:0"></i>';
            continue;
          }
          const h = ST.history[d];
          const m = h ? h.min : 0;
          const c =
            m === 0 ? "" : m < 20 ? "l1" : m < 40 ? "l2" : m < 60 ? "l3" : "l4";
          cells += `<i class="${c}" title="${d}: ${m} min"></i>`;
        }
        return cells;
      }
      function barChart() {
        const W = 640,
          H = 170,
          pb = 26,
          pt = 8;
        const days = [];
        for (let i = 13; i >= 0; i--) days.push(addDays(todayStr(), -i));
        const bw = (W - 20) / 14;
        const max = Math.max(
          60,
          ...days.map((d) => (ST.history[d] || {}).min || 0),
        );
        let bars = "";
        days.forEach((d, i) => {
          const m = (ST.history[d] || {}).min || 0;
          const h = (m / max) * (H - pb - pt);
          const x = 10 + i * bw;
          bars += `<rect x="${x + 3}" y="${H - pb - h}" width="${bw - 6}" height="${Math.max(h, 2)}" rx="4" fill="${m >= 60 ? "#16a34a" : m > 0 ? "#4f46e5" : "#e6e8f2"}"/>`;
          if (m > 0)
            bars += `<text x="${x + bw / 2}" y="${H - pb - h - 4}" font-size="10" fill="#5a5f78" text-anchor="middle">${m}</text>`;
          bars += `<text x="${x + bw / 2}" y="${H - 8}" font-size="9" fill="#9aa0b8" text-anchor="middle">${d.slice(8)}/${d.slice(5, 7)}</text>`;
        });
        bars += `<line x1="10" y1="${H - pb - (60 / max) * (H - pb - pt)}" x2="${W - 10}" y2="${H - pb - (60 / max) * (H - pb - pt)}" stroke="#16a34a" stroke-dasharray="4 4" opacity="0.5"/>`;
        return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">${bars}</svg>`;
      }

      }

      /* ---------- VOCAB ---------- */

      function exportData() {
        const blob = new Blob([JSON.stringify(ST)], {
          type: "application/json",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "ingles-diario-backup-" + todayStr() + ".json";
        a.click();
      }
      function importData(ev) {
        const f = ev.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = () => {
          try {
            const d = JSON.parse(r.result);
            if (d.v && d.srs !== undefined) {
              ST = Object.assign(defaultState(), d);
              save();
              alert("✓ Progreso importado");
              show("home");
            } else alert("Archivo no válido");
          } catch (e) {
            alert("Archivo no válido");
          }
        };
        r.readAsText(f);
      }

          speechSynthesis.getVoices();

      });
      if (!ST.test.done) renderOnboarding();
      else show("home");
    </script>
  </body>
